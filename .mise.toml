[tools]
bun = "1.3.10"

[tasks.commit-msg]
description = "Validate commit message with commitlint"
run = "bunx --bun commitlint --edit"

[tasks.setup]
description = "Set up git hooks"
run = """
bun install
if [ -d .git ]; then
  mise generate git-pre-commit --hook commit-msg --task commit-msg --write
else
  echo "Skipping hook setup (worktree detected)"
fi
"""
